<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CyberCycho</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="scanlines"></div>

  <header class="hero">
    <h1 class="glitch" data-text="CyberCycho">CyberCycho</h1>
    <p class="tagline">怀旧像素 / 轻量游戏开发</p>
  </header>

  <main>
    <section class="card">
      <h2>&gt; ABOUT</h2>
      <p>
        CyberCycho 专注制作低负担、快节奏、带着老式街机与早期个人电脑质感的小游戏。
        没有臃肿的引擎堆栈,只有能立刻打开就玩的东西。
      </p>
    </section>

    <section class="card">
      <h2>&gt; PROJECTS</h2>
      <ul class="project-list">
        <li>
          <span class="status">[ COMING SOON ]</span>
          <strong>项目占位符</strong>
          <p>第一款作品正在制作中,敬请期待。</p>
        </li>
      </ul>
    </section>

    <section class="card">
      <h2>&gt; STATUS</h2>
      <p>站点冒烟测试版本 — 部署链路验证中 (GitHub Pages)。</p>
    </section>
  </main>

  <footer>
    <p>&copy; <span id="year"></span> CyberCycho</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
